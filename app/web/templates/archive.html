{% extends "base.html" %}
{% block title %}归档 · {{ site_title }}{% endblock %}
{% block content %}
<div class="page-head"><h1>归档</h1></div>
{% if days %}
<ul class="archive-list">
  {% for d in days %}
  <li><a href="/archive/{{ d.run_date }}">{{ d.run_date }}</a>
      <span class="muted">{{ d.n }} 条精选 · {{ d.explained or 0 }} 篇深度讲解</span></li>
  {% endfor %}
</ul>
{% else %}<p class="muted">暂无数据。</p>{% endif %}
{% endblock %}
