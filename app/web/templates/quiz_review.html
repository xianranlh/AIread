{% extends "base.html" %}
{% block title %}复习模式 · {{ site_title }}{% endblock %}
{% block content %}
<div class="qr-layout">
  <div class="qr-main">
    <div class="page-head"><h1>复习模式</h1>
      <p class="muted" id="qr-progress">加载队列中…</p></div>
    <div id="qr-question"></div>
    <div id="qr-done" class="empty" hidden>
      <h2>🎉 本轮复习完成</h2>
      <p><button id="qr-retro" class="btn-primary" type="button">生成今日复盘笔记</button>
         <a class="btn-test" style="text-decoration:none" href="/quiz">回概览</a></p>
      <div id="qr-retro-out" class="prose" style="text-align:left"></div>
    </div>
  </div>
  <aside class="qr-timeline" id="qr-timeline">
    <h3>本次会话</h3>
    <ul id="qr-tl-list"></ul>
  </aside>
</div>
<div id="quiz-ratebar" hidden></div>
<script src="/static/quiz.js"></script>
{% endblock %}
