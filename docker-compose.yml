services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file: .env
    environment:
      - DB_PATH=/data/radar.db
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/healthz').raise_for_status()"]
      interval: 60s
      timeout: 10s
      retries: 3

  scheduler:
    build: .
    restart: unless-stopped
    command: python -m app.scheduler
    env_file: .env
    environment:
      - DB_PATH=/data/radar.db
      - TZ=Asia/Shanghai
      - HF_HOME=/data/hf-cache        # embedding 模型缓存，避免每次重启重新下载
    volumes:
      - ./data:/data
